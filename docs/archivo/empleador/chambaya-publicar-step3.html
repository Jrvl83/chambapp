<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChambaYa — Publicar Oferta Step 3</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1A1A2E;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    padding: 40px 20px;
  }

  /* ── PHONE FRAME ── */
  .phone-frame {
    width: 375px; height: 812px;
    background: #000;
    border-radius: 50px;
    position: relative;
    box-shadow:
      0 0 0 1px #333,
      0 0 0 3px #1a1a1a,
      0 30px 80px rgba(0,0,0,0.6),
      inset 0 0 0 1px #444;
    flex-shrink: 0;
  }
  .phone-frame::before {
    content: '';
    position: absolute;
    left: -3px; top: 130px;
    width: 3px; height: 32px;
    background: #2a2a2a;
    border-radius: 2px 0 0 2px;
    box-shadow: 0 44px 0 #2a2a2a, 0 88px 0 #2a2a2a;
  }
  .phone-frame::after {
    content: '';
    position: absolute;
    right: -3px; top: 165px;
    width: 3px; height: 62px;
    background: #2a2a2a;
    border-radius: 0 2px 2px 0;
  }

  /* ── SCREEN ── */
  .phone-screen {
    width: 100%; height: 100%;
    border-radius: 50px;
    overflow: hidden;
    background: #F8FAFC;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .notch {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 30px;
    background: #000;
    border-radius: 0 0 20px 20px;
    z-index: 100;
    pointer-events: none;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    height: 44px; background: #fff;
    display: flex; align-items: flex-end; justify-content: space-between;
    padding: 0 24px 6px;
    flex-shrink: 0; position: relative; z-index: 50;
  }
  .status-time { font-family: 'Inter'; font-weight: 600; font-size: 14px; color: #0F1419; padding-left: 6px; }
  .status-icons { display: flex; align-items: center; gap: 5px; padding-right: 6px; }

  /* ── HEADER ── */
  .header {
    background: #fff;
    padding: 10px 20px 12px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0; z-index: 40;
  }
  .logo { font-family: 'Poppins'; font-weight: 700; font-size: 20px; }
  .logo-c { color: #0F1419; }
  .logo-y { color: #0066FF; }
  .back-link { font-family: 'Inter'; font-weight: 500; font-size: 13px; color: #0066FF; }

  /* ── PROGRESS SECTION ── */
  .progress-section {
    background: #fff;
    padding: 16px 20px 12px;
    border-bottom: 1px solid #F1F5F9;
    flex-shrink: 0;
  }
  .steps-row { display: flex; align-items: center; margin-bottom: 12px; }

  .step-item {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px; flex-shrink: 0;
  }
  .step-circle {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Inter'; font-weight: 700; font-size: 13px;
  }
  .step-circle.done    { background: #00C48C; border: 2px solid #00C48C; }
  .step-circle.active  { background: #0066FF; border: 2px solid #0066FF; color: #fff; }
  .step-circle.pending { background: #fff;    border: 2px solid #E2E8F0; color: #A0AEC0; }

  .step-label { font-family: 'Inter'; font-weight: 500; font-size: 10px; }
  .step-label.done    { color: #00C48C; }
  .step-label.active  { color: #0066FF; }
  .step-label.pending { color: #A0AEC0; }

  .step-line { height: 2px; flex: 1; margin-bottom: 16px; }
  .step-line.done    { background: #00C48C; }
  .step-line.pending { background: #E2E8F0; }

  .progress-bar-track { height: 6px; background: #E2E8F0; border-radius: 3px; overflow: hidden; }
  .progress-bar-fill  { width: 75%; height: 100%; background: linear-gradient(90deg, #00C48C, #0066FF); border-radius: 3px; }

  /* ── SCROLL ── */
  .scroll-content {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    scrollbar-width: none;
    padding: 20px 16px;
  }
  .scroll-content::-webkit-scrollbar { display: none; }

  /* ── TITLES ── */
  .form-section-title {
    font-family: 'Poppins'; font-weight: 600; font-size: 17px;
    color: #0F1419; margin-bottom: 4px;
  }
  .form-subtitle {
    font-family: 'Inter'; font-weight: 400; font-size: 12.5px;
    color: #94A3B8; margin-bottom: 18px;
  }

  /* ── FIELD ── */
  .field { margin-bottom: 18px; }
  .field-label {
    font-family: 'Inter'; font-weight: 600; font-size: 13px;
    color: #0F1419; display: block; margin-bottom: 6px;
  }

  /* Select */
  .select-wrap { position: relative; }
  .field-select {
    width: 100%; height: 48px;
    border-radius: 10px; padding: 0 40px 0 14px;
    font-family: 'Inter'; font-weight: 400; font-size: 14px; color: #0F1419;
    background: #fff; outline: none;
    -webkit-appearance: none; appearance: none; cursor: pointer;
  }
  .field-select.has-value { border: 2px solid #0066FF; }
  .select-chevron {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%); pointer-events: none;
  }

  /* Textarea */
  .field-textarea {
    width: 100%; min-height: 100px;
    border-radius: 10px; padding: 12px 14px;
    font-family: 'Inter'; font-weight: 400; font-size: 14px;
    color: #0F1419; background: #fff;
    outline: none; resize: none; line-height: 1.5; display: block;
  }
  .field-textarea.has-value { border: 2px solid #0066FF; }
  .field-textarea.empty     { border: 2px solid #E2E8F0; color: #A0AEC0; }

  /* ── CHECKBOXES ── */
  .checkbox-group {
    display: flex; flex-direction: column;
    gap: 10px; margin-top: 8px;
  }
  .checkbox-item { display: flex; align-items: center; gap: 10px; }

  .cb-box {
    width: 22px; height: 22px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .cb-box.checked   { background: #0066FF; border: 2px solid #0066FF; }
  .cb-box.unchecked { background: #fff;    border: 2px solid #E2E8F0; }
  .cb-label { font-family: 'Inter'; font-weight: 400; font-size: 14px; color: #0F1419; }

  /* ── INFO BOX ── */
  .info-box {
    background: #EEF2FF;
    border-radius: 10px;
    padding: 12px 14px;
    display: flex; align-items: flex-start; gap: 8px;
    margin-top: 12px;
  }
  .info-box-text {
    font-family: 'Inter'; font-weight: 400; font-size: 12px;
    color: #475569; line-height: 1.4;
  }

  /* ── NAV BUTTONS ── */
  .nav-buttons { display: flex; gap: 10px; margin-top: 24px; }
  .btn-back {
    flex: 1; height: 48px;
    background: #fff; border: 2px solid #E2E8F0;
    color: #718096; font-family: 'Poppins'; font-weight: 600; font-size: 14px;
    border-radius: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-next {
    flex: 2; height: 48px;
    background: #0066FF; border: none;
    color: #fff; font-family: 'Poppins'; font-weight: 600; font-size: 14px;
    border-radius: 12px; cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,102,255,0.25);
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    background: #fff; border-top: 1px solid #E2E8F0;
    padding: 6px 0 16px;
    display: flex; align-items: flex-end;
    flex-shrink: 0;
  }
  .nav-tab {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 2px; cursor: pointer;
  }
  .nav-label { font-family: 'Inter'; font-weight: 600; font-size: 10px; color: #A0AEC0; }
  .nav-fab-wrap { flex: 1; display: flex; justify-content: center; align-items: flex-end; cursor: pointer; }
  .nav-fab {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0066FF, #003D99);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 12px rgba(0,102,255,0.35), 0 0 0 3px #E6F2FF;
    margin-top: -14px;
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="phone-screen">
    <div class="notch"></div>

    <!-- STATUS BAR -->
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg width="16" height="11" viewBox="0 0 17 12" fill="#0F1419"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
        <svg width="15" height="11" viewBox="0 0 16 12" fill="#0F1419"><path d="M8 9.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3z"/><path d="M4.5 6.5C5.7 5.3 6.8 4.7 8 4.7s2.3.6 3.5 1.8l1.2-1.2C11.3 3.9 9.7 3 8 3s-3.3.9-4.7 2.3l1.2 1.2z"/><path d="M1.5 3.5C3.3 1.7 5.5.7 8 .7s4.7 1 6.5 2.8l1.2-1.2C13.7.4 11-.3 8-.3S2.3.4.3 2.3l1.2 1.2z"/></svg>
        <svg width="24" height="11" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="#0F1419" stroke-width="1"/><rect x="22" y="3.5" width="2.5" height="5" rx="1.25" fill="#0F1419"/><rect x="2" y="2" width="16" height="8" rx="2" fill="#0F1419"/></svg>
      </div>
    </div>

    <!-- HEADER -->
    <div class="header">
      <div class="logo"><span class="logo-c">Chamba</span><span class="logo-y">Ya</span></div>
      <span class="back-link">← Volver</span>
    </div>

    <!-- PROGRESS SECTION -->
    <div class="progress-section">
      <div class="steps-row">

        <!-- Step 1: Done -->
        <div class="step-item">
          <div class="step-circle done">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 7 5.5 10.5 12 3"/></svg>
          </div>
          <span class="step-label done">Básico</span>
        </div>
        <div class="step-line done"></div>

        <!-- Step 2: Done -->
        <div class="step-item">
          <div class="step-circle done">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 7 5.5 10.5 12 3"/></svg>
          </div>
          <span class="step-label done">Detalles</span>
        </div>
        <div class="step-line done"></div>

        <!-- Step 3: Active -->
        <div class="step-item">
          <div class="step-circle active">3</div>
          <span class="step-label active">Requisitos</span>
        </div>
        <div class="step-line pending"></div>

        <!-- Step 4: Pending -->
        <div class="step-item">
          <div class="step-circle pending">4</div>
          <span class="step-label pending">Revisar</span>
        </div>

      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill"></div>
      </div>
    </div>

    <!-- SCROLL CONTENT -->
    <div class="scroll-content">

      <div class="form-section-title">Requisitos</div>
      <div class="form-subtitle">Todos los campos son opcionales</div>

      <!-- Campo 1: Experiencia -->
      <div class="field">
        <label class="field-label">Experiencia Requerida</label>
        <div class="select-wrap">
          <select class="field-select has-value">
            <option>Sin experiencia</option>
            <option selected>1–2 años</option>
            <option>3–5 años</option>
            <option>Más de 5 años</option>
          </select>
          <div class="select-chevron">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#A0AEC0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
      </div>

      <!-- Campo 2: Habilidades -->
      <div class="field">
        <label class="field-label">Habilidades Específicas</label>
        <textarea class="field-textarea has-value" readonly>Experiencia en instalación de tuberías de PVC y cobre. Manejo de herramientas de soldadura para tubería. Conocimiento en instalación de termas y calentadores.</textarea>
      </div>

      <!-- Campo 3: Qué debe traer -->
      <div class="field">
        <label class="field-label">¿Qué debe traer el trabajador?</label>
        <div class="checkbox-group">

          <!-- Herramientas — checked -->
          <div class="checkbox-item">
            <div class="cb-box checked">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="2 6 4.5 9 10 3"/>
              </svg>
            </div>
            <span class="cb-label">Herramientas propias</span>
          </div>

          <!-- Transporte — unchecked -->
          <div class="checkbox-item">
            <div class="cb-box unchecked"></div>
            <span class="cb-label">Transporte propio</span>
          </div>

          <!-- Equipos — checked -->
          <div class="checkbox-item">
            <div class="cb-box checked">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="2 6 4.5 9 10 3"/>
              </svg>
            </div>
            <span class="cb-label">Equipos de protección</span>
          </div>

        </div>
      </div>

      <!-- Campo 4: Requisitos adicionales — vacío -->
      <div class="field">
        <label class="field-label">Requisitos Adicionales</label>
        <textarea class="field-textarea empty" readonly placeholder="Ej: Disponibilidad inmediata, referencias verificables...">Ej: Disponibilidad inmediata, referencias verificables...</textarea>
      </div>

      <!-- Info box -->
      <div class="info-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0066FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0; margin-top:1px;">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span class="info-box-text">Requisitos claros ayudan a filtrar candidatos y ahorran tiempo en la selección.</span>
      </div>

      <!-- Nav buttons -->
      <div class="nav-buttons">
        <button class="btn-back">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#718096" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Atrás
        </button>
        <button class="btn-next">
          Siguiente
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>

    </div><!-- end scroll-content -->

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
      <div class="nav-tab">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A0AEC0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-label">Inicio</span>
      </div>
      <div class="nav-fab-wrap">
        <div class="nav-fab">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
      </div>
      <div class="nav-tab">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A0AEC0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <span class="nav-label">Candidatos</span>
      </div>
      <div class="nav-tab">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A0AEC0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span class="nav-label">Alertas</span>
      </div>
      <div class="nav-tab">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A0AEC0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="nav-label">Perfil</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
