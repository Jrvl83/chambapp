<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0066FF">
    <meta name="description" content="Inicia sesión en ChambaYa. Accede a tu cuenta para encontrar trabajo temporal o contratar trabajadores en Perú.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://firebasestorage.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- Favicon y App Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16.png">
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">

    <title>Iniciar Sesión - ChambaYa</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/design-system.css?v=2">
    <link rel="stylesheet" href="css/login.css?v=4">
    <link rel="stylesheet" href="css/accessibility.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/modal.css?v=9">
    <link rel="stylesheet" href="css/animations.css" media="print" onload="this.media='all'">
</head>
<body>
<script src="js/utils/page-loader.js"></script>
    <main>
    <div class="login-container">
        <div class="login-logo">
            <div class="login-logo-text">Chamba<span class="logo-ya">Ya</span></div>
            <p>Inicia sesión en tu cuenta</p>
        </div>

        <!-- Security Badge -->
        <div class="security-badge">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <p>Tus datos están seguros y encriptados</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email" class="required">Correo Electrónico</label>
                <div class="input-wrap">
                    <span class="input-icon" aria-hidden="true">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </span>
                    <input
                        type="email"
                        id="email"
                        placeholder="tu@email.com"
                        required
                        autocomplete="email"
                        aria-required="true"
                        aria-describedby="email-error"
                    >
                </div>
                <div id="email-error" role="alert" aria-live="polite"></div>
            </div>

            <div class="form-group">
                <label for="password" class="required">Contraseña</label>
                <div class="input-wrap">
                    <span class="input-icon" aria-hidden="true">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                    </span>
                    <input
                        type="password"
                        id="password"
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                        aria-required="true"
                        aria-describedby="password-error"
                    >
                    <button
                        type="button"
                        class="password-toggle"
                        onclick="togglePassword()"
                        aria-label="Mostrar contraseña"
                        id="password-toggle"
                    >
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
                <div id="password-error" role="alert" aria-live="polite"></div>
                <div class="forgot-password">
                    <a href="#" id="forgot-password-link">¿Olvidaste tu contraseña?</a>
                </div>
            </div>

            <button type="submit" class="btn-login" id="btn-login">
                <span class="btn-text">Iniciar Sesión</span>
                <svg class="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
        </form>

        <!-- Separador -->
        <div class="auth-divider">
            <span>o</span>
        </div>

        <!-- Google Sign-In -->
        <button type="button" class="btn-google" id="btn-google">
            <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continuar con Google
        </button>

        <div class="links">
            <p>¿No tienes cuenta? <a href="index.html">Regístrate aquí</a></p>
        </div>
    </div>

    <!-- Modal: selección de rol para usuarios nuevos con Google -->
    <div class="modal-overlay" id="modal-rol-google" style="display:none">
        <div class="modal-content modal-content--sm">
            <div class="modal-rol-body">
                <div style="font-size:2.5rem;margin-bottom:0.5rem;"></div>
                <h3>Bienvenido a ChambaYa</h3>
                <p>Para completar tu registro, dinos qu&eacute; buscas:</p>
                <div class="google-role-cards">
                    <button type="button" class="role-card" data-type="trabajador">
                        <div class="role-card-icon role-icon-trabajador">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0066FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </div>
                        <div>
                            <div class="role-card-title">Busco Trabajo</div>
                            <div class="role-card-desc">Encuentra chambas cerca de ti</div>
                        </div>
                        <svg class="role-card-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                    <button type="button" class="role-card" data-type="empleador">
                        <div class="role-card-icon role-icon-empleador">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#FF6B00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
                        </div>
                        <div>
                            <div class="role-card-title">Busco Trabajadores</div>
                            <div class="role-card-desc">Encuentra profesionales de confianza</div>
                        </div>
                        <svg class="role-card-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
    </main>

    <!-- Scripts -->
    <script src="js/toast.js" defer></script>
    <script src="js/config/firebase-config.js" defer></script>

    <!-- Script de login (ahora externo y organizado) -->
    <script type="module" src="js/auth/login.js"></script>
</body>
</html>
